<div class="admin-page">
  <h1>⚙️ Administración</h1>

  @if (message()) {
    <div class="alert" [class.alert-success]="messageType() === 'success'" [class.alert-error]="messageType() === 'error'">
      {{ message() }}
    </div>
  }

  <div class="admin-section card">
    <h2>👤 Crear Usuario</h2>
    <form (ngSubmit)="createUser()" class="create-user-form">
      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" placeholder="Nombre del usuario"
               [ngModel]="fullName()" (ngModelChange)="fullName.set($event)" name="fullName" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="email@ejemplo.com"
               [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" placeholder="Mínimo 6 caracteres, al menos un dígito"
               [ngModel]="password()" (ngModelChange)="password.set($event)" name="password" />
      </div>
      <div class="form-group">
        <label>Rol</label>
        <select [ngModel]="role()" (ngModelChange)="role.set($event)" name="role">
          <option value="User">Usuario</option>
          <option value="Admin">Administrador</option>
        </select>
      </div>
      <button type="submit" class="btn-primary btn-lg" [disabled]="creating()">
        @if (creating()) {
          <span class="loading-spinner"></span> Creando...
        } @else {
          Crear Usuario
        }
      </button>
    </form>
  </div>
</div>
